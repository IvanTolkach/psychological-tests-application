spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/psychologicaltestsdb?currentSchema=methodologies
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      port: 6379
      host: redis

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
    register-with-eureka: true
    fetch-registry: true
    should-enforce-registration-at-init: false
    healthcheck:
      enabled: true
    registry-fetch-interval-seconds: 30
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 5