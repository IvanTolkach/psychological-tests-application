server:
  port: 8082

  tomcat:
    threads:
      max: 500
    accept-count: 200
    max-connections: 10000

spring:
  application:
    name: methodologies-service

  datasource:
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 30000

  profiles:
    default: dev

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: methodologies
    liquibase-schema: methodologies

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false

  jackson:
    mapper:
      sort-properties-alphabetically: false
    time-zone: Europe/Moscow

management:
  endpoints:
    web:
      exposure:
        include: health,info