server:
  port: 8081

token:
  signing:
    key: VRohBVW65HZZQr2xVUSfgo4r9bbfIDIwaz6BH0ktJi0

admin:
  limits:
    max-super-admins: 2

spring:
  application:
    name: users-service

  docker:
    compose:
      enabled: false

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: users
    liquibase-schema: users

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/psychologicaltestsdb?currentSchema=users
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  jackson:
    mapper:
      sort-properties-alphabetically: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    enabled: true
    jersey:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info