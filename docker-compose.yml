services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE}
      - -c
      - work_mem=${POSTGRES_WORK_MEM}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-db-prod.sql:/docker-entrypoint-initdb.d/init-db-prod.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${POSTGRES_DB} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres-db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SCHEDULE=${BACKUP_SCHEDULE}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS}
      - BACKUP_SUFFIX=${BACKUP_SUFFIX}

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  eureka-server:
    image: ghcr.io/ivantolkach/psychological-tests-application/eureka-server:latest
    restart: unless-stopped
    ports:
      - "${EUREKA_EXTERNAL_PORT}:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${EUREKA_SERVER_PROFILE}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8761'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  users-service:
    image: ghcr.io/ivantolkach/psychological-tests-application/users-service:latest
    restart: unless-stopped
    ports:
      - "${USERS_SERVICE_EXTERNAL_PORT}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${USERS_SERVICE_PROFILE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ADMIN_MAX_SUPER_ADMINS: ${ADMIN_MAX_SUPER_ADMINS}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${USERS_DB_POOL_MAX_SIZE}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${USERS_DB_POOL_MIN_IDLE}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${USERS_DB_POOL_CONNECTION_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${USERS_DB_POOL_IDLE_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${USERS_DB_POOL_MAX_LIFETIME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  methodologies-service:
    image: ghcr.io/ivantolkach/psychological-tests-application/methodologies-service:latest
    restart: unless-stopped
    ports:
      - "${METHODOLOGIES_SERVICE_EXTERNAL_PORT}:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${METHODOLOGIES_SERVICE_PROFILE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${METHODOLOGIES_DB_POOL_MAX_SIZE}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${METHODOLOGIES_DB_POOL_MIN_IDLE}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${METHODOLOGIES_DB_POOL_CONNECTION_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${METHODOLOGIES_DB_POOL_IDLE_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${METHODOLOGIES_DB_POOL_MAX_LIFETIME}
    depends_on:
      users-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8082'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  tests-service:
    image: ghcr.io/ivantolkach/psychological-tests-application/tests-service:latest
    restart: unless-stopped
    ports:
      - "${TESTS_SERVICE_EXTERNAL_PORT}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${TESTS_SERVICE_PROFILE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${TESTS_DB_POOL_MAX_SIZE}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${TESTS_DB_POOL_MIN_IDLE}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${TESTS_DB_POOL_CONNECTION_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${TESTS_DB_POOL_IDLE_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${TESTS_DB_POOL_MAX_LIFETIME}
      SERVER_TOMCAT_THREADS_MAX: ${TESTS_TOMCAT_THREADS_MAX}
      SERVER_TOMCAT_ACCEPT_COUNT: ${TESTS_TOMCAT_ACCEPT_COUNT}
      SERVER_TOMCAT_MAX_CONNECTIONS: ${TESTS_TOMCAT_MAX_CONNECTIONS}
    depends_on:
      methodologies-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  attempts-service:
    image: ghcr.io/ivantolkach/psychological-tests-application/attempts-service:latest
    restart: unless-stopped
    ports:
      - "${ATTEMPTS_SERVICE_EXTERNAL_PORT}:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${ATTEMPTS_SERVICE_PROFILE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${ATTEMPTS_DB_POOL_MAX_SIZE}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${ATTEMPTS_DB_POOL_MIN_IDLE}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${ATTEMPTS_DB_POOL_CONNECTION_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${ATTEMPTS_DB_POOL_IDLE_TIMEOUT}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${ATTEMPTS_DB_POOL_MAX_LIFETIME}
    depends_on:
      tests-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8084'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "${NGINX_EXTERNAL_PORT}:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      users-service:
        condition: service_healthy
      methodologies-service:
        condition: service_healthy
      tests-service:
        condition: service_healthy
      attempts-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data: