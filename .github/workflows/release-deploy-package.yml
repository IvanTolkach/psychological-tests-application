name: Release Deployment Package

on:
  push:
    branches:
      - main
      - development

jobs:
  release:
    name: Build & publish deployment package
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build deployment-package.zip
        run: |
          mkdir -p Deploy/nginx Deploy/scripts
          cp nginx/nginx.conf             Deploy/nginx/nginx.conf
          cp scripts/init-db-prod.sql     Deploy/scripts/init-db-prod.sql
          cp scripts/preflight-prod.ps1   Deploy/scripts/preflight-prod.ps1
          cp scripts/smoke-prod.ps1       Deploy/scripts/smoke-prod.ps1
          cp .env.example                 Deploy/.env.example
          cp docker-compose.yml           Deploy/docker-compose.yml
          zip -r deployment-package.zip Deploy/

      - name: Delete previous deploy-latest release & tag
        run: |
          gh release delete deploy-latest --yes || true
          git push origin :refs/tags/deploy-latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with package
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          Actual deployment package with nginx config, SQL scripts, production checks, `.env.example`, and `docker-compose.yml`.

          Archive contents (`deployment-package.zip`):
          ```
          Deploy/
          |-- nginx/
          |   `-- nginx.conf
          |-- scripts/
          |   |-- init-db-prod.sql
          |   |-- preflight-prod.ps1
          |   `-- smoke-prod.ps1
          |-- .env.example
          `-- docker-compose.yml
          ```

          How to run:
          1. Copy `.env.example` to `.env`.
          2. Fill in at least these values in `.env`:
             - `DB_PASSWORD` - PostgreSQL password.
             - `TOKEN_SIGNING_KEY` - JWT signing secret key (base64 string).
             - `CORS_ALLOWED_ORIGINS` - allowed frontend origins.
          3. Adjust ports and service profiles in `.env` if needed.
          4. Run preflight: `powershell -ExecutionPolicy Bypass -File scripts/preflight-prod.ps1 -EnvFile .env -ComposeFile docker-compose.yml`.
          5. Run: `docker compose up -d`.
          6. Run smoke: `powershell -ExecutionPolicy Bypass -File scripts/smoke-prod.ps1 -EnvFile .env`.

          Updated automatically on each push to `main` and `development`.
          EOF

          gh release create deploy-latest deployment-package.zip \
            --title "Deployment Package (latest)" \
            --notes-file RELEASE_NOTES.md \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
