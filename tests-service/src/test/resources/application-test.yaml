spring:
  datasource:
    url: jdbc:h2:mem:tests-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false
  cloud:
    discovery:
      enabled: false
eureka:
  client:
    enabled: false

token:
  signing:
    key: test-signing-key-for-context-loads

CORS_ALLOWED_ORIGINS: http://localhost
