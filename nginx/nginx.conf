worker_processes  auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  8192;
    multi_accept on;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    sendfile        on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 10000;
    types_hash_max_size 2048;

    gzip  on;

    upstream eureka {
        server eureka-server:8761;
        keepalive 64;
    }

    upstream users {
        server users-service:8081;
        keepalive 64;
    }

    upstream methodologies {
        server methodologies-service:8082;
        keepalive 64;
    }

    upstream tests {
        server tests-service:8083;
        keepalive 256;
    }

    upstream attempts {
        server attempts-service:8084;
        keepalive 64;
    }

    server {
        listen       8080;
        server_name  localhost;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Origin $http_origin;

        location /api/ {
            location ~ ^/api/(students|admins|faculties|auth) {
                proxy_pass http://users;
            }

            location ~ ^/api/(methodologies|scales|score-ranges|scale-questions) {
                proxy_pass http://methodologies;
            }

            location ~ ^/api/(tests|questions|answer-options) {
                proxy_pass http://tests;
            }

            location ~ ^/api/(test-attempts|student-answers|test-attempt-scores|reports) {
                proxy_pass http://attempts;
            }
        }

        location /eureka/ {
            proxy_pass http://eureka/;
        }

        location / {
            root   html;
            index  index.html index.htm;
        }
    }
}
